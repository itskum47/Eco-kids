version: "3.9"

services:

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ecokids-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    ports:
      - "9090:9090"
    networks:
      - ecokids-net
    deploy:
      resources:
        limits:
          memory: 256m

  grafana:
    image: grafana/grafana:10.2.0
    container_name: ecokids-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-ecokids2024}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - ecokids-net
    deploy:
      resources:
        limits:
          memory: 128m

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: ecokids-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - ecokids-net
    deploy:
      resources:
        limits:
          memory: 64m

networks:
  ecokids-net:
    external: true

volumes:
  prometheus_data:
  grafana_data:
