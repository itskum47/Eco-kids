global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "ecokids-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:5001"]
        labels:
          service: "api"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
