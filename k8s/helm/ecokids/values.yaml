global:
  environment: production

api:
  replicaCount: 3
  image:
    repository: ghcr.io/your-org/ecokids/backend
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

worker:
  replicaCount: 2
  image:
    repository: ghcr.io/your-org/ecokids/backend
    pullPolicy: IfNotPresent
    tag: "latest"
  command: ["node", "workers/startGamificationWorker.js"]
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

service:
  type: ClusterIP
  port: 5001

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: api.ecokidsindia.org
      paths:
        - path: /
          pathType: Prefix

# Will be pulled from external secret stores (AWS Secrets Manager / Vault) in true enterprise setup
# Passed here for templating
secrets:
  mongodbUri: ""
  redisUri: ""
  jwtSecret: ""
  cloudinaryUrl: ""
