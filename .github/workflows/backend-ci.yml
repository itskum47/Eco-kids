name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install dependencies (Backend)
        working-directory: ./server
        run: npm ci

      - name: Run Linter (Backend)
        working-directory: ./server
        run: npm run lint --if-present
        
      - name: Run Unit Tests (Backend)
        working-directory: ./server
        run: npm test --if-present

      - name: Enforce Query Bounds
        run: npm run check:queries

      - name: Demo Smoke Gate
        if: ${{ github.event_name != 'pull_request' && secrets.DEMO_BASE_URL != '' && secrets.DEMO_STUDENT_TOKEN != '' && secrets.DEMO_TEACHER_TOKEN != '' }}
        env:
          DEMO_BASE_URL: ${{ secrets.DEMO_BASE_URL }}
          DEMO_STUDENT_TOKEN: ${{ secrets.DEMO_STUDENT_TOKEN }}
          DEMO_TEACHER_TOKEN: ${{ secrets.DEMO_TEACHER_TOKEN }}
        run: npm run demo:smoke

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
