name: EcoKids CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Cache server dependencies
        uses: actions/cache@v3
        with:
          path: server/node_modules
          key: server-${{ hashFiles('server/package-lock.json') }}
          restore-keys: server-

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Cache client dependencies
        uses: actions/cache@v3
        with:
          path: client/node_modules
          key: client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: client-

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Lint server
        run: npm run lint --if-present
        working-directory: server

      - name: Lint client
        run: npm run lint --if-present
        working-directory: client

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    env:
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Cache server dependencies
        uses: actions/cache@v3
        with:
          path: server/node_modules
          key: server-${{ hashFiles('server/package-lock.json') }}
          restore-keys: server-

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Cache client dependencies
        uses: actions/cache@v3
        with:
          path: client/node_modules
          key: client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: client-

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Run server tests
        run: npm test -- --passWithNoTests
        working-directory: server

      - name: Run client tests
        run: npm test -- --passWithNoTests
        working-directory: client

  build_and_push:
    name: Build Docker + Push GHCR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    env:
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server:${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${{ github.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-client:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-client:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        if: env.KUBE_CONFIG != ''
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" > $HOME/.kube/config

      - name: Deploy with kubectl apply
        if: env.KUBE_CONFIG != ''
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/ecokids-server --timeout=120s || true

      - name: Deploy with docker-compose fallback
        if: env.KUBE_CONFIG == ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose pull
            docker compose up -d
