<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#10b981">
  <title>EcoKids India — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0a0e17 0%, #111827 50%, #0f172a 100%);
      color: #e2e8f0;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .emoji {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .tips {
      text-align: left;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .tips h3 {
      font-size: 0.875rem;
      color: #10b981;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tips li {
      color: #94a3b8;
      font-size: 0.875rem;
      margin-bottom: 0.25rem;
      padding-left: 1.25rem;
      position: relative;
      list-style: none;
    }
    .tips li::before {
      content: '🌱';
      position: absolute;
      left: 0;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🌏</div>
    <h1>You're Offline</h1>
    <p>It looks like your internet connection dropped. Don't worry — your eco-progress is saved!</p>
    <div class="tips">
      <h3>While you're offline</h3>
      <ul>
        <li>Your pending activities will sync automatically when you reconnect</li>
        <li>Review your eco-tips and practice at home</li>
        <li>Plan your next environmental activity</li>
      </ul>
    </div>
    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Try Again
    </button>
  </div>
</body>
</html>
